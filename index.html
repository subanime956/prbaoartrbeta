 </header>
    <div class="container" id="gallery">
        <!-- Tarjetas generadas dinámicamente -->

    <script>
        const covers = [
          
            {
                img: "assets/img/Anime-C.webp",

                title: "Buscador Anime",
                keywords: "Buscar, buscador, animation",
                badge: "Categoría",
                link: "Anime.html"
            },
            {
                img: "assets/img/Hentai-C.webp",
              
                title: "Buscador Hentais",
                keywords: "Buscar, buscador, hentai",
                badge: "Categoría",
                link: "Hentai.html"
            },
            {
                img: "assets/img/Doujins-C.webp",
              
                title: "Buscador Doujins",
                badge: "Categoría",
                link: "Doujins.html"
            },
            {
                img: "assets/img/Rule34-C.webp",
              
                title: "Buscador Rule34",
                badge: "Categoría",
                link: "Rule34.html"
            },
            {
                img: "assets/img/Erogames-C.webp",
              
                title: "Buscar Erogames",
                badge: "Categoría",
                link: "Erogames.html"
            },
            {
                img: "assets/img/Peticiones-C.webp",
              
                title: "Peticiones",
                badge: "Categoría",
                link: "Peticiones.html"
            }
        ];

        function displayCovers() {
            const gallery = document.getElementById("gallery");
            gallery.innerHTML = "";

            covers.forEach(cover => {
                const card = document.createElement("a");
                card.className = "card";
                card.href = cover.link;
                card.id = cover.title.replace(/\s+/g, '-').toLowerCase(); // ID basado en el título
                card.innerHTML = `
                  <div style="position: relative;">
                           ${cover.badge ? `<span class="card-badge">${cover.badge}</span>` : ""}
                           <img src="${cover.img}" alt="${cover.title}" style="width: 100%;">
                  </div>
                  <div class="card-content">
                        <h3>${cover.title}</h3>
                  </div>
                `;
                gallery.appendChild(card);
            });
        }

        function searchAnime() {
    const input = document.getElementById("searchInput").value.toLowerCase().trim();
    const suggestionsDiv = document.getElementById("suggestions");

    if (input === "") {
        suggestionsDiv.style.display = "none";
        return;
    }

    const filtered = covers.filter(cover => {
        // Convertir keywords en array
        const keywordsArray = cover.keywords ? cover.keywords.split(",").map(k => k.trim().toLowerCase()) : [];
        
        return cover.title.toLowerCase().includes(input) || 
               keywordsArray.some(keyword => keyword.includes(input));
    });

    if (filtered.length > 0) {
        suggestionsDiv.innerHTML = filtered
            .map(cover => `<div class="suggestion-item" onclick="scrollToCard('${cover.title}')">${cover.title}</div>`)
            .join("");
        suggestionsDiv.style.display = "block";
    } else {
        suggestionsDiv.style.display = "none";
    }
}


function scrollToCard(title) {
    document.getElementById("searchInput").value = title;
    document.getElementById("suggestions").style.display = "none";

    const id = title.replace(/\s+/g, '-').toLowerCase();
    const card = document.getElementById(id);

    if (card) {
        card.scrollIntoView({ behavior: "smooth", block: "center" });

        // Usamos IntersectionObserver para detectar cuando la tarjeta es visible
        const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    card.classList.add("highlight");
                    
                    // Elimina la animación después de 1 segundo
                    setTimeout(() => {
                        card.classList.remove("highlight");
                    }, 1000);
                    
                    observer.disconnect(); // Detenemos la observación
                }
            });
        }, { threshold: 1.0 }); // 1.0 significa que el elemento debe estar 100% visible

        observer.observe(card);
    }
}


        // Inicializar la galería
        displayCovers();
    </script>
<script>
function buscar(){
  const valor = document.getElementById("busqueda").value.trim();

  if(valor !== ""){
    window.location.href = "/catalogo?search=" + encodeURIComponent(valor);
  }
}
</script>
