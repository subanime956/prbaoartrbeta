<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notificaciones PRO</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<!-- OneSignal -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script src="/assets/js/Onesignalpush.js" defer></script>

<style>
body{
  margin:0;
  font-family: Arial;
}

/* HEADER */
.header{
  height:60px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  color:white;
  position:relative;
}

#notifToggle{
  font-size:22px;
  background:none;
  border:none;
  cursor:pointer;
  color:white;
}

.active{ color:#00d1ff; }
.inactive{ color:#888; }

/* MINI WARNING */
#notifWarning{
  position:absolute;
  top:60px;
  right:10px;
  width:250px;
  background:#222;
  color:white;
  border-radius:10px;
  padding:10px;
  display:none;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
  animation:fadeIn 0.2s ease;
}

#notifWarning img{
  width:100%;
  border-radius:6px;
  margin-top:8px;
  cursor:pointer;
}

#notifWarning .close{
  position:absolute;
  top:5px;
  right:8px;
  cursor:pointer;
  font-size:14px;
  color:#aaa;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(-5px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="header">
  <div>MiWeb</div>

  <button id="notifToggle" class="inactive">
    <i class="fa fa-bell-slash" id="bellIcon"></i>
  </button>

  <!-- MINI PANEL -->
  <div id="notifWarning">
    <span class="close" id="closeWarning">✖</span>
    <p style="margin:5px 0;">🔕 Notificaciones bloqueadas</p>
    <a href="https://media.onesignal.com/web-sdk/bell/edge-unblock.png" target="_blank">
      <img src="https://media.onesignal.com/web-sdk/bell/edge-unblock.png">
    </a>
  </div>

</div>

<script>
const btn = document.getElementById("notifToggle");
const icon = document.getElementById("bellIcon");
const warning = document.getElementById("notifWarning");
const closeBtn = document.getElementById("closeWarning");

function updateUI(state){
  if(state){
    icon.className = "fa fa-bell";
    btn.classList.add("active");
    btn.classList.remove("inactive");
  }else{
    icon.className = "fa fa-bell-slash";
    btn.classList.add("inactive");
    btn.classList.remove("active");
  }
}

window.OneSignalDeferred = window.OneSignalDeferred || [];

OneSignalDeferred.push(async function(OneSignal){

  function sync(){
    updateUI(OneSignal.User.PushSubscription.optedIn);
  }

  sync();
  setTimeout(sync, 300);

  btn.addEventListener("click", async function(){

  const permission = Notification.permission;
  const opted = OneSignal.User.PushSubscription.optedIn;

  // 🚫 BLOQUEADO
  if(permission === "denied"){
    warning.style.display = "block";
    return;
  }

  if(opted){
    // 🔕 DESUSCRIBIR
    await OneSignal.User.PushSubscription.optOut();

  } else {

    if(permission === "granted"){
      // 🔥 YA TIENE PERMISO → SUSCRIBIR DIRECTO
      await OneSignal.User.PushSubscription.optIn();

    } else {
      // 🔔 PEDIR PERMISO
      await OneSignal.Notifications.requestPermission();
    }
  }

  setTimeout(sync, 200);
});

  closeBtn.onclick = () => warning.style.display = "none";

});
</script>

</body>
</html>
