<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Header Notificaciones</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<!-- OneSignal (YA LO USAS TÚ) -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script src="/assets/js/Onesignalpush.js" defer></script>

<style>
  body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f4f4;
  }

  /* HEADER */
  .header{
    width:100%;
    height:60px;
    background:#111;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    box-sizing:border-box;
  }

  .logo{
    font-weight:bold;
    font-size:18px;
  }

  /* BOTÓN NOTIF */
  #notifToggle{
    font-size:22px;
    background:none;
    border:none;
    cursor:pointer;
    color:white;
    transition:0.2s;
  }

  #notifToggle:hover{
    transform:scale(1.1);
  }

  .active{
    color:#00d1ff;
  }

  .inactive{
    color:#888;
  }
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">MiWeb</div>

  <button id="notifToggle" class="inactive">
    <i class="fa fa-bell-slash" id="bellIcon"></i>
  </button>
</div>

<script>
const btn = document.getElementById("notifToggle");
const icon = document.getElementById("bellIcon");

let isSubscribed = false;

function updateUI() {
  if (isSubscribed) {
    icon.className = "fa fa-bell";
    btn.classList.add("active");
    btn.classList.remove("inactive");
  } else {
    icon.className = "fa fa-bell-slash";
    btn.classList.add("inactive");
    btn.classList.remove("active");
  }
}

window.OneSignalDeferred = window.OneSignalDeferred || [];

OneSignalDeferred.push(async function(OneSignal) {

  // 🔎 estado real (v16)
  isSubscribed = OneSignal.User.PushSubscription.optedIn;
  updateUI();

  // 🔁 click toggle
  btn.addEventListener("click", async function() {

    if (OneSignal.User.PushSubscription.optedIn) {
      await OneSignal.User.PushSubscription.optOut();
      isSubscribed = false;
    } else {
      await OneSignal.User.PushSubscription.optIn();
      isSubscribed = true;
    }

    updateUI();
  });

});
</script>

</body>
</html>
