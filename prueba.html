<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notificaciones Test</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<!-- OneSignal -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script src="/assets/js/Onesignalpush.js" defer></script>

<style>
  body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f4f4;
  }

  /* HEADER */
  .header{
    width:100%;
    height:60px;
    background:#111;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
  }

  .logo{
    font-weight:bold;
  }

  /* BOTÓN */
  #notifToggle{
    font-size:22px;
    background:none;
    border:none;
    cursor:pointer;
    color:white;
    transition:0.2s;
  }

  #notifToggle:hover{
    transform:scale(1.1);
  }

  .active{
    color:#00d1ff;
  }

  .inactive{
    color:#888;
  }

  /* WARNING */
  #notifWarning{
    display:none;
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
  }

  #notifWarning img{
    max-width:220px;
    border-radius:10px;
    margin-top:10px;
    cursor:pointer;
  }
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">MiWeb</div>

  <button id="notifToggle" class="inactive">
    <i class="fa fa-bell-slash" id="bellIcon"></i>
  </button>
</div>

<!-- WARNING (solo aparece si está bloqueado y hacen click) -->
<div id="notifWarning">
  <p>🔕 Tienes las notificaciones bloqueadas</p>
  <a href="https://media.onesignal.com/web-sdk/bell/edge-unblock.png" target="_blank">
    <img src="https://media.onesignal.com/web-sdk/bell/edge-unblock.png">
  </a>
</div>

<script>
const btn = document.getElementById("notifToggle");
const icon = document.getElementById("bellIcon");
const warning = document.getElementById("notifWarning");

function updateUI(state) {
  if (state) {
    icon.className = "fa fa-bell";
    btn.classList.add("active");
    btn.classList.remove("inactive");
  } else {
    icon.className = "fa fa-bell-slash";
    btn.classList.add("inactive");
    btn.classList.remove("active");
  }
}

window.OneSignalDeferred = window.OneSignalDeferred || [];

OneSignalDeferred.push(function(OneSignal) {

  function syncState() {
    const opted = OneSignal.User.PushSubscription.optedIn;
    updateUI(opted);
  }

  // 🔥 estado inicial rápido
  syncState();
  setTimeout(syncState, 300);

  // 🔁 CLICK
  btn.addEventListener("click", async function() {

    const perm = Notification.permission;

    // 🚫 SOLO AQUÍ detecta bloqueo
    if (perm === "denied") {
      warning.style.display = "block";
      return;
    }

    const opted = OneSignal.User.PushSubscription.optedIn;

    if (opted) {
      await OneSignal.User.PushSubscription.optOut();
    } else {
      await OneSignal.showNativePrompt();
    }

    // ⚡ actualización rápida
    setTimeout(syncState, 200);
  });

});
</script>

</body>
</html>
