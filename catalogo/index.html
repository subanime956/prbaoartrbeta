<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Catálogo</title>
<style>
body{background:#0f172a;color:white;font-family:Arial;padding:20px}
#resultados{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:15px}
.card{background:#1e293b;border-radius:10px;overflow:hidden}
.card img{width:100%;height:200px;object-fit:cover}
#paginacion a{margin:5px;color:white;text-decoration:none;background:#1e293b;padding:5px 10px;border-radius:5px}
</style>
</head>
<body>

<h2 id="titulo">Resultados</h2>

<div>
<a href="/catalogo?genre=romance">Romance</a>
<a href="/catalogo?genre=casadas">Casadas</a>
<a href="/catalogo?genre=romance&genre=casadas">Romance + Casadas</a>
</div>

<div id="resultados" class="container"></div>
<div id="paginacion"></div>

<script src="../catalogo.js"></script>
</body>
</html>
