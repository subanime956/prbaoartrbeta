<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notificaciones PRO</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script src="/assets/js/Onesignalpush.js" defer></script>

<style>
body{margin:0;font-family:Arial;}

.header{
  height:60px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  color:white;
  position:relative;
}

#notifToggle{
  font-size:22px;
  background:none;
  border:none;
  cursor:pointer;
  color:white;
}

.active{ color:#00d1ff; }
.inactive{ color:#888; }

/* PANEL */
#notifPanel{
  position:absolute;
  top:60px;
  right:10px;
  width:260px;
  background:#222;
  border-radius:10px;
  padding:12px;
  display:none;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

#notifPanel .close{
  position:absolute;
  top:5px;
  right:8px;
  cursor:pointer;
  color:#aaa;
}

.onesignal-customlink-container{
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  <div>MiWeb</div>
<div class="onesignal-customlink-container"></div>
  <button id="notifToggle" class="inactive">
    <i class="fa fa-bell-slash" id="bellIcon"></i>
  </button>

  <!-- PANEL -->
  <div id="notifPanel">
    <span class="close" id="closePanel">✖</span>
    <p style="margin:5px 0;">🔔 Gestionar notificaciones</p>

    <!-- BOTÓN REAL -->
    <div class="onesignal-customlink-container"></div>
  </div>
</div>

<script>
const btn = document.getElementById("notifToggle");
const icon = document.getElementById("bellIcon");
const panel = document.getElementById("notifPanel");
const closeBtn = document.getElementById("closePanel");

function updateUI(state){
  if(state){
    icon.className = "fa fa-bell";
    btn.classList.add("active");
    btn.classList.remove("inactive");
  } else {
    icon.className = "fa fa-bell-slash";
    btn.classList.add("inactive");
    btn.classList.remove("active");
  }
}

window.OneSignalDeferred = window.OneSignalDeferred || [];

OneSignalDeferred.push(function(OneSignal){

  // 🔥 estado inicial instantáneo
  updateUI(Notification.permission === "granted");

  // 🔥 sync real
  setTimeout(() => {
    updateUI(OneSignal.User.PushSubscription.optedIn);
  }, 300);

  // 🔔 abrir panel
  btn.onclick = () => {
    panel.style.display = panel.style.display === "block" ? "none" : "block";
  };

  closeBtn.onclick = () => panel.style.display = "none";

  // 🔥 detectar cambios reales (CLAVE)
  OneSignal.User.PushSubscription.addEventListener("change", (e) => {
    updateUI(e.current.optedIn);
  });

});
</script>

</body>
</html>
