<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notificaciones PRO</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script src="/assets/js/Onesignalpush.js" defer></script>

<style>
body{margin:0;font-family:Arial;}

.header{
  height:60px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  color:white;
  position:relative;
}

#notifToggle{
  font-size:22px;
  background:none;
  border:none;
  cursor:pointer;
  color:white;
}

.active{ color:#00d1ff; }
.inactive{ color:#888; }

/* WARNING */
#notifWarning, #notifToast{
  position:absolute;
  top:60px;
  right:10px;
  width:250px;
  background:#222;
  color:white;
  border-radius:10px;
  padding:10px;
  display:none;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
  animation:fadeIn 0.2s ease;
}

#notifToast{
  background:#fff;
  color:#111;
}

#notifWarning img{
  width:100%;
  border-radius:6px;
  margin-top:8px;
  cursor:pointer;
}

.close{
  position:absolute;
  top:5px;
  right:8px;
  cursor:pointer;
  font-size:14px;
  color:#aaa;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(-5px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="header">
  <div>MiWeb</div>

  <button id="notifToggle" class="inactive">
    <i class="fa fa-bell-slash" id="bellIcon"></i>
  </button>

  <!-- WARNING -->
  <div id="notifWarning">
    <span class="close" id="closeWarning">✖</span>
    <p style="margin:5px 0;">🔕 Notificaciones bloqueadas</p>
    <a href="https://media.onesignal.com/web-sdk/bell/edge-unblock.png" target="_blank">
      <img src="https://media.onesignal.com/web-sdk/bell/edge-unblock.png">
    </a>
  </div>

  <!-- TOAST REUTILIZABLE -->
  <div id="notifToast">
    <span class="close" id="closeToast">✖</span>
    <p id="toastText" style="margin:5px 0;"></p>
  </div>

</div>

<script>
const btn = document.getElementById("notifToggle");
const icon = document.getElementById("bellIcon");
const warning = document.getElementById("notifWarning");
const closeWarning = document.getElementById("closeWarning");

const toast = document.getElementById("notifToast");
const toastText = document.getElementById("toastText");
const closeToast = document.getElementById("closeToast");

let toastTimeout;

// UI inmediata
if (Notification.permission === "granted") {
  icon.className = "fa fa-bell";
  btn.classList.add("active");
} else {
  icon.className = "fa fa-bell-slash";
  btn.classList.add("inactive");
}

function updateUI(state){
  if(state){
    icon.className = "fa fa-bell";
    btn.classList.add("active");
    btn.classList.remove("inactive");
  } else {
    icon.className = "fa fa-bell-slash";
    btn.classList.add("inactive");
    btn.classList.remove("active");
  }
}

// 🔥 TOAST INTELIGENTE (ANTI-SPAM)
function showToast(text){

  // cerrar warning si está abierto
  warning.style.display = "none";

  // cambiar texto
  toastText.textContent = text;

  // mostrar
  toast.style.display = "block";

  // reiniciar tiempo si ya estaba activo
  clearTimeout(toastTimeout);

  toastTimeout = setTimeout(() => {
    toast.style.display = "none";
  }, 2000);
}

window.OneSignalDeferred = window.OneSignalDeferred || [];

OneSignalDeferred.push(async function(OneSignal){

  function sync(){
    updateUI(OneSignal.User.PushSubscription.optedIn);
  }

  setTimeout(sync, 100);

  btn.addEventListener("click", async function(){

    const permission = Notification.permission;

    if(permission === "denied"){
      toast.style.display = "none";
      warning.style.display = "block";
      return;
    }

    const opted = OneSignal.User.PushSubscription.optedIn;

    if(opted){
      await OneSignal.User.PushSubscription.optOut();
      updateUI(false);
      showToast("🔕 Desactivaste las notificaciones");

    } else {

      if(permission === "default"){
        await OneSignal.Notifications.requestPermission();
      } else {
        await OneSignal.User.PushSubscription.optIn();
      }

      updateUI(true);
      showToast("🔔 Activaste las notificaciones");
    }
  });

  closeWarning.onclick = () => warning.style.display = "none";
  closeToast.onclick = () => toast.style.display = "none";

});
</script>

</body>
</html>
